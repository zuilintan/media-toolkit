# git-cliff 配置：按 conventional commits 分类生成 release notes
# 文档：https://git-cliff.org/docs/configuration

[changelog]
# 单 tag 渲染模板（--latest 时只输出当前版本段）
header = ""
trailer = ""
footer = ""

# Tera 模板语法
body = """
{% if version -%}
## {{ version | trim_start_matches(pat="v") }} — {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## Unreleased
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | split(pat="\\n") | first | trim }}\
{% endfor %}
{% endfor %}
"""

[git]
# 解析 conventional commit footer / breaking change
conventional_commits = true
# 不丢弃无 type 前缀的提交（用户有些是 "gui: ..." / "pack: ..." 无标准 type）
filter_unconventional = false
# 不分割多 issue
split_commits = false

# 提交分组规则（按顺序匹配，先匹配优先）
commit_parsers = [
  { message = "^feat",      group = "✨ Features" },
  { message = "^fix",       group = "🐛 Bug Fixes" },
  { message = "^perf",      group = "⚡ Performance" },
  { message = "^refactor",  group = "♻️ Refactor" },
  { message = "^docs",      group = "📝 Documentation" },
  { message = "^test",      group = "🧪 Tests" },
  { message = "^ci",        group = "⚙️ CI" },
  { message = "^build",     group = "📦 Build" },
  { message = "^chore",     group = "🔧 Chore" },
  # 兜底：把 "gui:" / "pack:" 这类非标准 type 也展示出来
  { message = ".*",         group = "📌 Other" },
]

# 升序处理 commits，按时间升序在每组内呈现
filter_commits = false
topo_order = false
sort_commits = "oldest"
