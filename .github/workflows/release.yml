name: Release

# 触发：推送形如 v0.1.5 的 tag 时自动构建并发布；也允许在 Actions 页手动触发。
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '已存在的 tag 名（如 v0.1.5），手动触发时必填'
        required: true
        type: string

permissions:
  contents: write  # 创建 release / 上传成果物

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout (tag)
        uses: actions/checkout@v4
        with:
          # 手动触发时 checkout 指定 tag；push tag 触发时默认 checkout 该 tag
          ref: ${{ github.event.inputs.tag || github.ref }}
          # git-cliff 需要完整 commit/tag 历史界定 --latest 的范围
          fetch-depth: 0

      - name: Set up uv
        # setup-uv 自带 PATH 注入与跨平台缓存，比手动 pipx 装 uv 稳。
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: 'uv.lock'

      - name: Install Python 3.13
        # 用 uv 管理 Python；pyproject 里 requires-python = ">=3.11"，但 GUI
        # 受 PySide6 wheel 限制 3.13 是当前最稳的版本。
        run: uv python install 3.13

      - name: Install dependencies (gui + dev)
        run: uv sync --extra gui --group dev --python 3.13

      - name: Resolve version tag
        id: tag
        shell: bash
        run: |
          # push tag 触发: github.ref = refs/tags/vX.Y.Z；workflow_dispatch: 用输入
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build GUI exe (PyInstaller, onefile windowed)
        run: |
          uv run pyinstaller --noconfirm --windowed --onefile `
            --name "media-toolkit-gui-${{ steps.tag.outputs.name }}" `
            --add-data "mt/data/examples.json;mt/data" `
            --collect-submodules mt `
            mt/gui/__main__.py

      - name: Smoke test exe (启动后立即结束即视为失败)
        shell: pwsh
        run: |
          $exe = "dist/media-toolkit-gui-${{ steps.tag.outputs.name }}.exe"
          $p = Start-Process -FilePath $exe -PassThru
          Start-Sleep -Seconds 10
          if ($p.HasExited) {
            Write-Error "exe 启动 10s 内退出 (ExitCode=$($p.ExitCode))，打包可能有问题"
            exit 1
          }
          Stop-Process -Id $p.Id -Force
          Write-Host "OK: exe 启动 10s 仍在运行"

      - name: Generate changelog (git-cliff)
        # 按 conventional commits 分类生成"当前 tag 范围"的 changelog
        # 配置见仓库根目录 cliff.toml
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGES.md

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          # 用 git-cliff 输出的结构化 changelog 作为 release notes
          body: ${{ steps.changelog.outputs.content }}
          # 允许更新已存在的 release（手动重跑时不报错）
          fail_on_unmatched_files: true
          files: dist/media-toolkit-gui-${{ steps.tag.outputs.name }}.exe
