[tool.poetry]
name = "manga-toolkit"
version = "0.1.0"
description = "漫画文件整理工具集：重命名 & ComicInfo.xml 生成"
authors = []
readme = "README.md"
packages = [{include = "mt"}]

[tool.poetry.dependencies]
python = "^3.11"
# 繁简转换（可选，二选一）
zhconv = {version = ">=1.4.0", optional = true}

[tool.poetry.extras]
zhconv = ["zhconv"]

[tool.poetry.scripts]
# CLI 命令名用连字符（CLI 惯例），模块名用下划线（PEP 8）
manga-toolkit-cli = "mt.manga_toolkit_cli:main"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
