[tool.poetry]
name = "manga-toolkit"
version = "0.1.2"
description = "漫画文件整理工具集：重命名 & ComicInfo.xml 生成"
authors = []
readme = "README.md"
packages = [{include = "mt"}]

[tool.poetry.dependencies]
python = "^3.11"
# 繁简转换（译名繁体→简体，必选）
zhconv = ">=1.4.0"
# 封面图像处理（cover 子命令必选）
Pillow = ">=10.0"
# smartcrop 显著性裁剪（cover --smart 模式）
smartcrop = ">=0.3.2"

[tool.poetry.group.dev.dependencies]
pytest = ">=8.0"

[tool.poetry.scripts]
# CLI 命令名用连字符（CLI 惯例），模块名用下划线（PEP 8）
manga-toolkit-cli = "mt.manga_toolkit_cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
